site_name: llm-harness
site_description: 生产级 AI Agent 开发基座 — 25 行代码构建一个 Agent
site_author: H-Mr
site_url: https://h-mr.github.io/llm-harness/
repo_name: H-Mr/llm-harness
repo_url: https://github.com/H-Mr/llm-harness
edit_uri: edit/main/docs/mkdocs/
docs_dir: docs/mkdocs

copyright: MIT License — H-Mr

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            separate_signature: true
            docstring_style: google
            show_signature_annotations: true
            signature_crossrefs: true
            line_length: 80
            merge_init_into_class: true
            show_submodules: true

nav:
  - 首页: index.md
  - 教程 (Tutorial):
      - 快速开始: tutorials/quick-start.md
      - 编写自定义工具: tutorials/custom-tool.md
      - 配置文件驱动: tutorials/config-driven.md
  - 指南 (How-to):
      - 部署到 K8s: how-to/deploy-k8s.md
      - 对接微信/飞书: how-to/multi-channel.md
      - 创建定时任务: how-to/use-cron.md
      - 开启观测追踪: how-to/enable-observability.md
  - API 参考 (Reference):
      - Harness: api/harness.md
      - Agent: api/agent.md
      - Loop 循环: api/loop.md
      - Tools 工具: api/tools.md
      - Providers 提供者: api/providers.md
      - Permissions 权限: api/permissions.md
      - Hooks 钩子: api/hooks.md
      - Memory 记忆: api/memory.md
      - Session 会话: api/session.md
      - Observability 观测: api/observability.md
      - Cron 定时: api/cron.md
      - Channels 通道: api/channels.md
      - MCP: api/mcp.md
      - Context 上下文: api/context.md
      - Config 配置: api/config.md
  - 解释 (Explanation):
      - 架构设计: explanation/architecture.md
      - 设计决策: explanation/design-decisions.md
      - 工具执行管线: explanation/pipeline.md
      - 记忆模型: explanation/memory-model.md
      - 并发模型: explanation/concurrency.md
